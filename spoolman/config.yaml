name: Spoolman
version: "0.23.1-0"
slug: spoolman
description: "Keep track of your inventory of 3D-printer filament spools."
arch:
  - amd64
  - aarch64
  - armv7
startup: services
init: false
map:
  - addon_config:rw
  - data:rw
ports:
  7912/tcp: 7912
ports_description:
  7912/tcp: "Web interface port (fixed: 7912, do not change). If another add-on uses this host port, HA will show an error."
webui: "http://[HOST]:[PORT:7912]"
environment:
  SPOOLMAN_HOST: "0.0.0.0"
  SPOOLMAN_PORT: "7912"
  SPOOLMAN_DIR_DATA: "/config"
  SPOOLMAN_DIR_BACKUPS: "/config/backups"
  SPOOLMAN_DIR_LOGS: "/config/logs"
options:
  SPOOLMAN_DEBUG_MODE: false
schema:
  SPOOLMAN_DEBUG_MODE: bool
homeassistant_api: false
hassio_api: true
# Ingress (web UI in HA sidebar)
ingress: true
ingress_port: 7912
panel_icon: mdi:printer-3d-nozzle
panel_title: Spoolman
